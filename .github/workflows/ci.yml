name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile Python entrypoints
        run: |
          python -m py_compile \
            github_podcast_pipeline.py \
            skills/github-research-podcast/scripts/podcast.py \
            skills/github-research-podcast/scripts/validate_report.py \
            scripts/install_skill.py
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Validate maintained research report
        run: |
          python skills/github-research-podcast/scripts/validate_report.py \
            outputs/daily-research/2026-07-15_xiaolai_nlpm.md \
            --index outputs/daily-research/index.md
      - name: Install audio verification tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
      - name: Verify preserved podcast episode
        run: |
          python github_podcast_pipeline.py verify \
            --script outputs/2026-07-05_gitingest_single_repo_script.md \
            --audio outputs/2026-07-05_gitingest_single_repo.m4a
